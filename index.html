<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News Radar · AI + Language-Learning for the French Tutor</title>
  <meta name="description" content="A daily curated radar of AI model/voice/video releases and language-learning product launches — filtered for building a better French voice tutor." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand-badge">📡</span>
        <div>
          <h1>News Radar</h1>
          <p class="tagline">AI models · voice · video · language-learning — curated for the French tutor</p>
        </div>
      </div>

      <div class="controls">
        <div class="search">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"/></svg>
          <input id="search" type="search" placeholder="Search titles, summaries, tags…" autocomplete="off" spellcheck="false" />
        </div>
        <div id="chips" class="chips" role="group" aria-label="Filter by category"></div>
      </div>
    </div>
  </header>

  <main class="wrap" id="main">
    <div id="status" class="status">Loading the radar…</div>
    <div id="feed" class="feed" hidden></div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span id="footer-meta"></span>
      <span class="footer-sep">·</span>
      <span>Generated by the <code>/news-digest</code> skill</span>
    </div>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
